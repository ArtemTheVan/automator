name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest

  windows-build:
    name: Windows build (MSYS2)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-opencv

      - name: Build (with OpenCV)
        run: make all

      - name: Print version
        run: ./console/automator_console.exe --version

      - name: Build without OpenCV
        run: |
          make clean
          # Скрываем OpenCV: пустим pkg-config мимо.
          PKG_CONFIG_PATH= make all PKG_CONFIG=/usr/bin/false
          ./console/automator_console.exe --version
